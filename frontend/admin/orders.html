<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>VESTRA · Buyurtmalar</title>
  <link rel="stylesheet" href="main.css"/>
</head>
<body>
  <main class="wrap">
    <div class="page-head">
      <div>
        <div class="page-title">Buyurtmalar</div>
        <div class="page-sub" id="countSub">Yuklanmoqda…</div>
      </div>
      <div class="head-tools">
        <div class="search-bar"><span>⌕</span><input id="q" placeholder="Raqam yoki mijoz nomi…"/></div>
        <select id="fStatus" class="form-select">
          <option value="">Barcha holatlar</option>
          <option value="pending">Kutilmoqda</option>
          <option value="processing">Jarayonda</option>
          <option value="shipped">Yuborildi</option>
          <option value="delivered">Yetkazildi</option>
          <option value="cancelled">Bekor qilindi</option>
        </select>
      </div>
    </div>

    <div class="panel">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Raqam</th><th>Mijoz</th><th>Mahsulot</th><th>Summa</th><th>Holat</th><th>Sana</th><th></th></tr></thead>
          <tbody id="body"><tr><td colspan="7" class="empty-state">Yuklanmoqda…</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
  mountNav('orders');
  let all=[];

  async function load(){ const r=await api('/api/orders'); if(!r)return; all=await r.json(); render(); }

  function render(){
    const q=document.getElementById('q').value.toLowerCase();
    const s=document.getElementById('fStatus').value;
    const list=all.filter(o=>{
      if(q && !String(o.id).includes(q) && !(o.customer_name||'').toLowerCase().includes(q)) return false;
      if(s && o.status!==s) return false; return true;
    });
    document.getElementById('countSub').textContent=list.length+' ta buyurtma';
    document.getElementById('body').innerHTML = list.length ? list.map(o=>`
      <tr>
        <td class="id-pill">#${o.id}</td>
        <td><div style="font-weight:500">${esc(o.customer_name)||'—'}</div>
          ${o.customer_phone?`<div class="text-muted" style="font-size:.72rem">${esc(o.customer_phone)}</div>`:''}</td>
        <td class="text-muted">${o.items_count||'—'} ta</td>
        <td class="font-mono" style="font-weight:700">${money(o.total_amount)}</td>
        <td><select class="status-select ${o.status}" onchange="setStatus(${o.id},this)">
          ${['pending','processing','shipped','delivered','cancelled'].map(s=>`<option value="${s}" ${o.status===s?'selected':''}>${STATUS_UZ[s]}</option>`).join('')}
        </select></td>
        <td class="text-muted" style="font-size:.78rem">${dateShort(o.created_at)}</td>
        <td><button class="btn btn-danger btn-icon btn-sm" onclick="del(${o.id})" title="O'chirish">✕</button></td>
      </tr>`).join('') : '<tr><td colspan="7" class="empty-state">Buyurtma topilmadi</td></tr>';
  }

  async function setStatus(id,sel){
    sel.className='status-select '+sel.value;
    const r=await api(`/api/orders/${id}/status`,{method:'PATCH',body:JSON.stringify({status:sel.value})});
    if(r&&r.ok) toast('Holat yangilandi');
  }
  async function del(id){
    if(!confirm("Buyurtmani o'chirishni tasdiqlaysizmi?")) return;
    const r=await api(`/api/orders/${id}`,{method:'DELETE'});
    if(r&&r.ok){ toast("O'chirildi"); load(); }
  }

  document.getElementById('q').addEventListener('input',render);
  document.getElementById('fStatus').addEventListener('change',render);
  load();
  </script>
</body>
</html>
